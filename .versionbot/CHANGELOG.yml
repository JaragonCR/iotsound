    - subject: "feat(deps): Wave 2 — replace private multiroom registry with Debian
        packages"
      hash: 88beae425fdcacac188bb0e9c24ff4b68ac0fb59
      body: >
        - multiroom-server: bh.cr/g_tomas_migone1/multiroom-%%BALENA_ARCH%% →
        debian:bookworm-slim

        - multiroom-client: same


        Both images are now self-contained — snapserver/snapclient installed
        from

        official Debian Bookworm repos. No dependency on personal Balena Hub
        account.

        Adds libpulse0 + libasound2-plugins for ALSA/PulseAudio bridge
        compatibility.

        start.sh and snapserver.conf unchanged.
      footer:
