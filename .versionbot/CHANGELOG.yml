    - subject: "feat(deps): Wave 1 — drop Buster EOL and pin hostname base image"
      hash: 4c2d86ab174642d5074a8b7970598f3ad7464219
      body: |
        - upnp: balenalib/debian:buster (EOL Sept 2024) → debian:bookworm-slim
        - hostname: balenalib/alpine (untagged) → alpine:3.21

        Both services use official Docker Hub multi-arch images, removing the
