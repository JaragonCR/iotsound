    - subject: "feat(ci): add workflow to annotate Dependabot PRs with Change-type:
        patch"
      hash: 23a794ce19598373ad4632684e6f85f6c1bc432a
      body: |
        Dependabot commits have no Change-type trailer. Instead of relying on
        versionist.conf.js hooks (which balena-versionist may not invoke), this
        workflow adds an empty annotation commit to every Dependabot branch so
        the standard versionist Change-type parser always finds a valid level.
        Loop-safe: the check step skips if Change-type is already present.
