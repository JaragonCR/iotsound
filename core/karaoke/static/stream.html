<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Singer View</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;position:relative}
  #player{width:100%;height:100vh;object-fit:contain;display:block}
  #waiting{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;gap:16px}
  #waiting h1{color:#bb86fc;font-size:2rem}
  #waiting p{color:#999}
  /* Overlays */
  .overlay{position:absolute;pointer-events:none}
  #back-btn{top:16px;left:16px;pointer-events:all;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;cursor:pointer;font-size:.9rem;padding:8px 14px;position:absolute}
  #singer-pill{top:16px;right:16px;background:rgba(187,134,252,.15);border:1px solid #bb86fc;border-radius:20px;color:#bb86fc;font-size:.85rem;font-weight:700;padding:6px 14px;position:absolute;text-decoration:none}
  #qr-wrap{bottom:16px;left:16px;position:absolute;cursor:pointer}
  #qr-wrap img{border-radius:8px;opacity:.75;transition:opacity .2s;width:80px;height:80px;display:block}
  #qr-wrap:hover img{opacity:1}
  #qr-label{background:rgba(0,0,0,.6);border-radius:4px;color:#aaa;font-size:.7rem;margin-top:4px;padding:2px 6px;text-align:center}
  #status{bottom:16px;right:16px;position:absolute;color:#555;font-size:.75rem}
</style>
</head>
<body>

<video id="player" autoplay playsinline></video>

<div id="waiting">
  <h1>🎤 Singer View</h1>
  <p>Waiting for a song to start…</p>
  <p id="waiting-sub" style="color:#555;font-size:.85rem"></p>
  <a href="/" style="background:#bb86fc;border-radius:8px;color:#000;font-weight:700;padding:10px 20px;text-decoration:none">← Back to Queue</a>
</div>

<button id="back-btn" onclick="window.location='/'">← Queue</button>
<a id="singer-pill" href="#" onclick="goProfile(event)">👤 <span id="pill-name">Guest</span></a>

<div id="qr-wrap" onclick="this.classList.toggle('expanded')">
  <img id="qr-img" src="" alt="QR">
  <div id="qr-label">Scan to join</div>
</div>

<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
const singerName = localStorage.getItem('karaoke_singer') || 'Guest';
document.getElementById('pill-name').textContent = singerName;

function goProfile(e) {
  e.preventDefault();
  if (singerName !== 'Guest') window.location = '/singer/' + encodeURIComponent(singerName);
}

// ── HLS Player ────────────────────────────────────────────────────────────────
const video   = document.getElementById('player');
const waiting = document.getElementById('waiting');
let hls, playing = false, pollTimer;

function startStream() {
  const src = '/stream/playlist.m3u8';
  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, backBufferLength: 4 });
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
    hls.on(Hls.Events.ERROR, (_,d)=>{ if(d.fatal) onStreamDown(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.play();
  }
  video.onplaying = ()=>{ playing=true; waiting.style.display='none'; };
  video.onpause   = ()=>{ if(!playing) return; };
}

function onStreamDown() {
  playing = false;
  waiting.style.display='flex';
  if (hls) { hls.destroy(); hls=null; }
  // Retry after 3s
  setTimeout(startStream, 3000);
}

// Poll /api/data to update waiting message with next-up info
function pollStatus() {
  fetch('/api/data').then(r=>r.json()).then(d=>{
    const sub = document.getElementById('waiting-sub');
    if (d.now_playing) {
      sub.textContent = '▶ ' + (d.now_playing.singer||'') + ' is singing — stream starting…';
    } else if (d.next_up) {
      sub.textContent = 'Next up: ' + (d.next_up.singer||'') + ' — ' + (d.next_up.title||'');
    } else {
      sub.textContent = 'Queue is empty';
    }
  }).catch(()=>{});
}

// ── QR Code ───────────────────────────────────────────────────────────────────
function loadQR() {
  // Point to main queue page
  const url = location.protocol + '//' + location.hostname + (location.port?':'+location.port:'') + '/';
  const qrImg = document.getElementById('qr-img');
  // Use qrencode via a simple API if available, else omit
  // We serve a /qr endpoint that generates the QR via the qrencode binary
  qrImg.src = '/static/qr.png';
  qrImg.onerror = ()=>{ document.getElementById('qr-wrap').style.display='none'; };
}

startStream();
pollStatus();
setInterval(pollStatus, 3000);
loadQR();
</script>
</body>
</html>
